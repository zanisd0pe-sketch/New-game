<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        
        .room-stage {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Wall: Dark, moody */
        .wall { height: 60%; width: 100%; background: #121212; }

        /* Floor: Anchored container */
        .floor { 
            height: 40%; width: 100%;
            background-color: #2a2a2a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 8px 8px;
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 5vw; padding-bottom: 2vh;
        }

        /* Plants: Sized up so they don't look like tiny stars */
        .plant-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        .leaf { 
            width: 120px; height: 120px; background: #2d5a27;
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%);
        }
        .pot { width: 80px; height: 70px; background: #333; border: 3px solid #555; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="room-stage">
        <div class="wall"></div>
        <div class="floor">
            <div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>
        </div>
    </div>
</body>
</html>
