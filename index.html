<!DOCTYPE html>
<html>
<head>
    <title>My Game</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        canvas { border: 2px solid white; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>My Awesome Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "cyan";
        ctx.fillRect(150, 150, 100, 100); // Draws a box
    </script>
</body>
</html>
