<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; }

        /* The main display area */
        .grow-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* The floor is now a fixed-height bar at the bottom, not a container for everything */
        .floor-base { height: 100px; background: #222; border-top: 4px solid #444; }

        /* Larger, clearly defined plants */
        .plant { width: 80px; text-align: center; }
        .leaf { 
            width: 80px; height: 80px; background: #2d5a27;
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%);
        }
        .pot { width: 60px; height: 60px; background: #333; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="grow-zone">
        <div class="plant"><div class="leaf"></div><div class="pot"></div></div>
        <div class="plant"><div class="leaf"></div><div class="pot"></div></div>
        <div class="plant"><div class="leaf"></div><div class="pot"></div></div>
    </div>
    <div class="floor-base"></div>
</body>
</html>
