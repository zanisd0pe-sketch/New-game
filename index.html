<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; margin: 0; }
        .room-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; display: none; }
        .active { display: flex; }
        .nav-map { position: fixed; bottom: 0; width: 100%; background: #333; padding: 10px; display: flex; justify-content: space-around; }
        button { padding: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- FARM ROOM -->
    <div id="farm" class="room-view active">
        <h1>GROW ROOM</h1>
        <p>Supply: <span id="weed">0</span>g</p>
        <button onclick="growWeed()">Manual Harvest</button>
    </div>

    <!-- DISPENSARY ROOM -->
    <div id="shop" class="room-view">
        <h1>DISPENSARY</h1>
        <p>Cash: $<span id="money">0</span></p>
        <p id="status">Open for business</p>
    </div>

    <!-- MAP NAVIGATION -->
    <div class="nav-map">
        <button onclick="showRoom('farm')">Map: Farm</button>
        <button onclick="showRoom('shop')">Map: Dispensary</button>
    </div>

    <script>
        let money = 0; let weed = 0;

        function showRoom(roomId) {
            document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active'));
            document.getElementById(roomId).classList.add('active');
        }

        function growWeed() { weed += 1; document.getElementById("weed").innerText = weed; }

        setInterval(() => {
            if (weed >= 1) {
                weed--; money += 10;
                document.getElementById("weed").innerText = weed;
                document.getElementById("money").innerText = money;
                document.getElementById("status").innerText = "Sold 1g!";
            }
        }, 2000);
    </script>
</body>
</html>
