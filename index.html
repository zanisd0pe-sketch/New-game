<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; display: none; flex-direction: column; align-items: center; position: relative; }
        .active { display: flex; }

        /* Industrial Grow Room */
        #farm { background: linear-gradient(to bottom, #111, #000); }
        
        /* Realistic Lighting/Ventilation Rig */
        .ceiling-rig { width: 90%; height: 100px; background: #1a1a1a; margin-top: 20px; border-bottom: 5px solid #333; display: flex; justify-content: space-around; align-items: center; border-radius: 5px; }
        .light-unit { width: 120px; height: 60px; background: #444; border: 2px solid #666; box-shadow: 0 10px 30px rgba(255, 200, 50, 0.4); }
        .vent-duct { width: 80px; height: 80px; background: #333; border: 2px solid #555; border-radius: 50%; }

        /* Side-view Staged Plants */
        .bench { width: 85%; height: 20px; background: #222; margin-top: 150px; border-bottom: 10px solid #111; }
        .plant-area { display: flex; gap: 50px; margin-top: -120px; }
        .plant-side { width: 100px; height: 160px; background: #1b5e20; border-radius: 20px 20px 5px 5px; border: 4px solid #004d40; }
        .pot-side { width: 110px; height: 80px; background: #3e2723; margin-top: -20px; border-radius: 0 0 10px 10px; }

        .tarp-floor { width: 100%; height: 120px; background: #080808; position: absolute; bottom: 0; border-top: 2px solid #222; }

        #map-menu { display: none; position: fixed; top: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .map-btn { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 15px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <button class="map-btn" onclick="toggleMap()">MAP</button>

    <div id="map-menu">
        <button onclick="showRoom('farm')">Grow Room</button>
        <button onclick="showRoom('shop')">Dispensary</button>
    </div>

    <div id="farm" class="room-view active">
        <div class="ceiling-rig">
            <div class="light-unit"></div>
            <div class="vent-duct"></div>
            <div class="light-unit"></div>
        </div>

        <div class="plant-area">
            <div style="text-align:center"><div class="plant-side"></div><div class="pot-side"></div></div>
            <div style="text-align:center"><div class="plant-side"></div><div class="pot-side"></div></div>
            <div style="text-align:center"><div class="plant-side"></div><div class="pot-side"></div></div>
        </div>
        <div class="bench"></div>
        
        <h2 style="margin-top: 50px;">SUPPLY: <span id="weed">0</span>g</h2>
        <button onclick="growWeed()">HARVEST</button>
        
        <div class="tarp-floor"></div>
    </div>

    <div id="shop" class="room-view">
        <h1>DISPENSARY</h1>
        <p>Cash: $<span id="money">0</span></p>
    </div>

    <script>
        let money = 0; let weed = 0;
        function toggleMap() { const m = document.getElementById('map-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showRoom(id) { document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMap(); }
        function growWeed() { weed += 3; document.getElementById("weed").innerText = weed; }
        setInterval(() => { if (weed >= 1) { weed--; money += 10; document.getElementById("weed").innerText = weed; document.getElementById("money").innerText = money; } }, 2000);
    </script>
</body>
</html>
