<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; }
        
        #game-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        .hud { padding: 15px; text-align: center; background: #111; }
        
        #farm { 
            flex-grow: 1; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: flex-end;
            gap: 15px; padding: 20px; overflow-y: auto;
            background-color: #2a2a2a; border-top: 5px solid #111;
        }

        .plant-container { display: flex; flex-direction: column; align-items: center; width: 20vw; }
        .leaf { width: 15vw; height: 15vw; background: #2d5a27; clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%); }
        .pot { width: 10vw; height: 8vh; background: #333; border: 2px solid #555; border-radius: 5px; }

        /* Increased height to push the button higher up */
        .controls { height: 25vh; display: flex; justify-content: center; align-items: flex-start; padding-top: 2vh; background: #0a0a0a; }
        button { padding: 3vw 6vw; font-size: 5vw; cursor: pointer; background: #222; color: #fff; border: 2px solid #444; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="hud">
            <h1>$ <span id="money">0</span></h1>
            <p>Plants: <span id="plant-count">1</span></p>
        </div>
        <div id="farm"></div>
        <div class="controls">
            <button onclick="game.buyPlant()">Buy Plant ($<span id="cost">10</span>)</button>
        </div>
    </div>

    <script>
        let game = {
            money: 0,
            plants: 1,
            cost: 10,
            updateUI() {
                document.getElementById('money').innerText = Math.floor(this.money);
                document.getElementById('plant-count').innerText = this.plants;
                document.getElementById('cost').innerText = this.cost;
            },
            buyPlant() {
                if (this.money >= this.cost) {
                    this.money -= this.cost;
                    this.plants++;
                    this.cost = Math.floor(this.cost * 1.2);
                    this.renderPlants();
                    this.updateUI();
                }
            },
            renderPlants() {
                const farm = document.getElementById('farm');
                farm.innerHTML = '';
                for(let i=0; i<this.plants; i++) {
                    farm.innerHTML += '<div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>';
                }
            }
        };
        setInterval(() => { game.money += (game.plants * 0.1); game.updateUI(); }, 100);
        game.renderPlants();
    </script>
</body>
</html>
