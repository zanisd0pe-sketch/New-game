<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; height: 100vh; font-family: sans-serif; }
        .room { width: 100vw; height: 100vh; background: #050505; position: relative; }

        /* The floor is now a larger, solid stage */
        .floor { 
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: #111; border-top: 2px solid #222;
            display: flex; justify-content: center; align-items: flex-end; gap: 20px;
            padding-bottom: 30px;
        }

        /* Plant Group: Now includes Stem + Leaf + Pot */
        .plant-group { display: flex; flex-direction: column; align-items: center; }
        .stem { width: 6px; height: 30px; background: #3e2723; }
        .leaf { 
            width: 120px; height: 120px; background: #2d5a27;
            clip-path: polygon(50% 10%, 60% 30%, 85% 20%, 70% 45%, 95% 55%, 65% 60%, 80% 90%, 50% 70%, 20% 90%, 35% 60%, 5% 55%, 30% 45%, 15% 20%, 40% 30%);
            margin-bottom: -10px;
        }
        .pot { width: 80px; height: 70px; background: #1a1a1a; border: 2px solid #333; border-radius: 5px 5px 25px 25px; }
    </style>
</head>
<body>
    <div class="room">
        <div class="floor">
            <div class="plant-group"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
            <div class="plant-group"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
            <div class="plant-group"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
        </div>
    </div>
</body>
</html>
