<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; overflow: hidden; perspective: 800px; height: 100vh; }
        
        /* The 3D Scene Container */
        .scene {
            width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            display: flex; flex-direction: column; align-items: center;
        }

        /* The Mylar Wall */
        .wall {
            width: 100%; height: 60%;
            background: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%);
            background-size: 40px 40px; background-color: #0f0f0f;
            border-bottom: 4px solid #333;
        }

        /* The 3D Floor Illusion */
        .floor {
            width: 100%; height: 40%;
            background: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%);
            background-size: 40px 40px; background-color: #050505;
            transform: rotateX(60deg); /* This creates the 3D slope */
            transform-origin: top;
            box-shadow: inset 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Content sits on the floor */
        .content { position: absolute; top: 50%; display: flex; gap: 50px; }
    </style>
</head>
<body>
    <div class="scene">
        <div class="wall"></div>
        <div class="floor"></div>
        <div class="content">
            <!-- Your plants and items go here -->
        </div>
    </div>
</body>
</html>
