<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; }
        
        .room-view { height: 100vh; display: none; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; }
        .active { display: flex; }

        /* Grow Room Vibe */
        #farm { 
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 50%, #2c2c2c 100%);
            border-left: 20px solid #333; border-right: 20px solid #333; /* Mylar reflection feel */
        }
        .light-hood { width: 300px; height: 40px; background: #444; border-bottom: 5px solid #222; margin-top: 0; box-shadow: 0 10px 30px rgba(255, 255, 150, 0.3); }
        .shelf { width: 600px; height: 150px; background: #222; border-top: 10px solid #444; margin-top: 100px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 10px; }
        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .pot { width: 60px; height: 70px; background: #4a3728; border-radius: 5px; }
        .plant-top { width: 80px; height: 80px; background: radial-gradient(#4caf50, #1b5e20); border-radius: 50% 50% 20% 20%; margin-bottom: -10px; }

        #map-menu { display: none; position: fixed; top: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .map-btn { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="map-btn" onclick="toggleMap()">MAP</button>

    <div id="map-menu">
        <button onclick="showRoom('farm')">Grow Room</button>
        <button onclick="showRoom('shop')">Dispensary</button>
    </div>

    <div id="farm" class="room-view active">
        <div class="light-hood"></div>
        <div class="shelf">
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
        </div>
        <h2 style="margin-top: 50px;">SUPPLY: <span id="weed">0</span>g</h2>
        <button onclick="growWeed()">HARVEST</button>
    </div>

    <div id="shop" class="room-view">
        <h1>DISPENSARY</h1>
        <p>Cash: $<span id="money">0</span></p>
    </div>

    <script>
        let money = 0; let weed = 0;
        function toggleMap() { const m = document.getElementById('map-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showRoom(id) { document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMap(); }
        function growWeed() { weed += 1; document.getElementById("weed").innerText = weed; }
        setInterval(() => { if (weed >= 1) { weed--; money += 10; document.getElementById("weed").innerText = weed; document.getElementById("money").innerText = money; } }, 2000);
    </script>
</body>
</html>
