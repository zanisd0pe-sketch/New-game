<!DOCTYPE html>
<html>
<head>
    <title>Idle Game</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        #score { font-size: 2em; margin: 20px; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>
    <h1>My Idle Game</h1>
    <div id="score">Points: 0</div>
    <button onclick="addPoint()">Click Me!</button>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById("score");

        function addPoint() {
            score++;
            scoreDisplay.innerText = "Points: " + score;
        }
    </script>
</body>
</html>
