<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .stats { font-size: 1.5em; margin: 10px; }
        button { padding: 15px 25px; font-size: 1.1em; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Dispo Tycoon</h1>
    <div class="stats">Money: $<span id="money">0</span></div>
    <div class="stats">Product: <span id="weed">0</span>g</div>
    
    <button onclick="growWeed()">Grow Weed (+1g)</button>
    <button onclick="sellWeed()">Sell Weed ($10/g)</button>

    <script>
        let money = 0;
        let weed = 0;

        function growWeed() {
            weed++;
            document.getElementById("weed").innerText = weed;
        }

        function sellWeed() {
            if (weed > 0) {
                weed--;
                money += 10;
                document.getElementById("weed").innerText = weed;
                document.getElementById("money").innerText = money;
            } else {
                alert("You're out of product!");
            }
        }
    </script>
</body>
</html>
