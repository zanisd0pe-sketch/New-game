<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon: Pro Edition</title>
    <style>
        body { background: #050505; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* Muted, realistic tent background */
        #farm { background: radial-gradient(circle at 50% 20%, #1a1a1a 0%, #000 70%); }
        
        /* Realistic leaf using clip-path (no harsh gradients) */
        .plant { 
            width: 160px; height: 160px; 
            background: #2D5A27;
            clip-path: polygon(50% 0%, 65% 20%, 95% 20%, 75% 45%, 90% 80%, 50% 65%, 10% 80%, 25% 45%, 5% 20%, 35% 20%);
            margin-bottom: -40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }
        
        /* Softer secondary leaf layer */
        .plant::after {
            content: ''; position: absolute; width: 140px; height: 140px; 
            background: #4A7C44;
            clip-path: polygon(50% 5%, 60% 25%, 90% 25%, 70% 45%, 85% 75%, 50% 60%, 15% 75%, 30% 45%, 10% 25%, 40% 25%);
            margin-top: 10px; margin-left: -70px;
        }

        /* Fabric Grow Bag Pot */
        .pot { 
            width: 100px; height: 85px; 
            background: #2a2a2a; 
            border-bottom: 8px solid #1a1a1a;
            border-radius: 5px 5px 30px 30px;
            position: relative;
        }
        .pot::before { content: ''; position: absolute; top: -5px; width: 100%; height: 10px; background: #333; border-radius: 5px; }

        .plant-area { display: flex; gap: 60px; align-items: flex-end; flex-grow: 1; margin-bottom: 100px; }
        .floor { width: 100%; height: 120px; background: #080808; border-top: 2px solid #222; }
        
        .ui { position: absolute; top: 40px; text-align: center; }
        button { padding: 12px 24px; cursor: pointer; background: #222; border: 1px solid #444; color: #fff; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="farm" class="room-view">
        <div class="ui">
            <h2>SUPPLY: <span id="weed">0</span>g</h2>
            <button onclick="grow()">HARVEST</button>
        </div>
        <div class="plant-area">
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
        </div>
        <div class="floor"></div>
    </div>
    <script>
        let w = 0;
        function grow() { w += 3; document.getElementById("weed").innerText = w; }
    </script>
</body>
</html>
