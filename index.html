<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; }
        .active { display: flex; }

        /* Grow Room: Industrial Tent Vibe */
        #farm { 
            background: linear-gradient(to bottom, #1a1a1a, #050505); 
            border-left: 30px solid #222; border-right: 30px solid #222; 
        }
        
        .light-hood { width: 450px; height: 40px; background: #222; border-bottom: 8px solid #444; box-shadow: 0 15px 60px rgba(255, 250, 150, 0.3); margin-bottom: 20px; }
        
        /* The Floor/Tarp Layer */
        .tarp-floor { width: 100%; height: 180px; background: #0d0d0d; border-top: 4px solid #333; z-index: 1; }
        
        /* Plants on the floor */
        .plant-area { position: absolute; bottom: 80px; display: flex; gap: 60px; z-index: 2; }
        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .pot { width: 90px; height: 80px; background: #3d2b1f; border-radius: 5px; box-shadow: inset 0 -10px 10px rgba(0,0,0,0.5); }
        .plant-top { width: 130px; height: 130px; background: #2e7d32; border-radius: 50% 50% 40% 40%; margin-bottom: -20px; box-shadow: 0 0 20px #1b5e20; }

        /* UI elements */
        .controls { position: absolute; top: 100px; text-align: center; z-index: 3; }
        #map-menu { display: none; position: fixed; top: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .map-btn { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <button class="map-btn" onclick="toggleMap()">MAP</button>

    <div id="map-menu">
        <button onclick="showRoom('farm')">Grow Room</button>
        <button onclick="showRoom('shop')">Dispensary</button>
    </div>

    <div id="farm" class="room-view active">
        <div class="controls">
            <h2>SUPPLY: <span id="weed">0</span>g</h2>
            <button onclick="growWeed()">HARVEST</button>
        </div>
        
        <div class="light-hood"></div>
        
        <div class="plant-area">
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="plant-top"></div><div class="pot"></div></div>
        </div>
        
        <div class="tarp-floor"></div>
    </div>

    <div id="shop" class="room-view">
        <h1>DISPENSARY</h1>
        <p>Cash: $<span id="money">0</span></p>
    </div>

    <script>
        let money = 0; let weed = 0;
        function toggleMap() { const m = document.getElementById('map-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showRoom(id) { document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMap(); }
        function growWeed() { weed += 1; document.getElementById("weed").innerText = weed; }
        setInterval(() => { if (weed >= 1) { weed--; money += 10; document.getElementById("weed").innerText = weed; document.getElementById("money").innerText = money; } }, 2000);
    </script>
</body>
</html>
