<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon: Proper Build</title>
    <style>
        body { background: #050505; color: #ccc; font-family: sans-serif; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; }

        #farm { background: #0a0a0a; }

        .plant-area { display: flex; gap: 40px; align-items: flex-end; flex-grow: 1; margin-bottom: 50px; }
        .pot-box { display: flex; flex-direction: column; align-items: center; }

        /* Actual Fan Leaf Shape */
        .plant { 
            width: 180px; height: 180px; background: #2d5a27;
            /* Serrated fan leaf shape */
            clip-path: polygon(50% 0%, 55% 25%, 75% 15%, 65% 40%, 90% 40%, 70% 60%, 95% 75%, 60% 70%, 55% 100%, 45% 70%, 5% 75%, 30% 60%, 10% 40%, 35% 40%, 25% 15%, 45% 25%);
            margin-bottom: -20px;
        }

        /* Fabric Grow Bag */
        .pot { 
            width: 100px; height: 90px; background: #1a1a1a;
            border: 2px solid #333; border-radius: 5px 5px 40px 40px;
            position: relative; box-shadow: inset 0 0 10px #000;
        }
        /* Top rim of the bag */
        .pot::before { content: ''; position: absolute; top: -5px; width: 110px; height: 10px; background: #222; border-radius: 5px; left: -5px; }

        .floor { width: 100%; height: 100px; background: #000; border-top: 2px solid #222; }
    </style>
</head>
<body>
    <div id="farm" class="room-view">
        <div class="plant-area">
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
        </div>
        <div class="floor"></div>
    </div>
</body>
</html>
