<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .box { border: 2px solid #444; padding: 20px; width: 200px; }
        button { padding: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Dispo Tycoon</h1>
    <div class="grid">
        <div class="box">
            <h3>Farm</h3>
            <p>Product: <span id="weed">0</span>g</p>
            <p>Growers: <span id="growers">0</span></p>
            <button onclick="buyGrower()">Hire Grower ($50)</button>
        </div>
        <div class="box">
            <h3>Countertop</h3>
            <p>Money: $<span id="money">0</span></p>
            <p>Customers: <span id="customers">1</span></p>
            <p id="status">Open for business...</p>
        </div>
    </div>

    <script>
        let money = 0;
        let weed = 0;
        let growers = 0;
        let pricePerGram = 10;

        function buyGrower() {
            if (money >= 50) {
                money -= 50;
                growers++;
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById("money").innerText = money;
            document.getElementById("weed").innerText = weed;
            document.getElementById("growers").innerText = growers;
        }

        // Production Loop (Every 1 second)
        setInterval(() => {
            weed += growers;
            updateDisplay();
        }, 1000);

        // Sales Loop (Customers buy every 3 seconds)
        setInterval(() => {
            if (weed >= 1) {
                weed--;
                money += pricePerGram;
                document.getElementById("status").innerText = "Customer bought 1g!";
            } else {
                document.getElementById("status").innerText = "Counter empty...";
            }
            updateDisplay();
        }, 3000);
    </script>
</body>
</html>
