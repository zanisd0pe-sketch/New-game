<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #111; height: 100vh; overflow: hidden; font-family: sans-serif; }

        .room-stage { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* The Wall: Mylar-like, dark and reflective */
        .wall { height: 65%; width: 100%; background: #1a1a1a; border-bottom: 3px solid #333; }

        /* The Floor: Real concrete texture (fine noise) */
        .floor { 
            height: 35%; width: 100%;
            background-color: #333;
            /* Fine noise texture for concrete */
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 4px 4px;
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 5vw; padding-top: 2vh;
        }

        /* Plants: Reduced size to stop clipping */
        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .leaf { width: 10vh; height: 10vh; background: #2d5a27; border-radius: 50%; }
        .stem { width: 0.8vh; height: 4vh; background: #4e342e; }
        .pot { width: 7vh; height: 6vh; background: #222; border: 0.3vh solid #444; border-radius: 0 0 1vh 1vh; }
    </style>
</head>
<body>
    <div class="room-stage">
        <div class="wall"></div>
        <div class="floor">
            <div class="plant-container"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
            <div class="plant-container"><div class="leaf"></div><div class="stem"></div><div class="pot"></div></div>
        </div>
    </div>
</body>
</html>
