<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; }
        
        /* The Wall: Dark grey with a visible boundary */
        .wall { flex: 1; background: #1a1a1a; border-bottom: 8px solid #333; }

        /* The Floor: A solid dark grey platform */
        .floor { height: 300px; background: #0a0a0a; display: flex; justify-content: center; gap: 50px; align-items: flex-end; padding-bottom: 50px; }

        /* Plant: A more realistic shape */
        .plant { width: 120px; display: flex; flex-direction: column; align-items: center; }
        .leaf-head { width: 120px; height: 120px; background: #2d5a27; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
        .stem { width: 8px; height: 60px; background: #4e342e; }
        .pot { width: 90px; height: 80px; background: #333; border: 4px solid #555; }
    </style>
</head>
<body>
    <div class="wall"></div>
    <div class="floor">
        <div class="plant"><div class="leaf-head"></div><div class="stem"></div><div class="pot"></div></div>
        <div class="plant"><div class="leaf-head"></div><div class="stem"></div><div class="pot"></div></div>
        <div class="plant"><div class="leaf-head"></div><div class="pot"></div></div>
    </div>
</body>
</html>
