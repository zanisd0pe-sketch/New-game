<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon: Real Tent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .room-view { 
            height: 100vh; width: 100vw; 
            /* Mylar wall pattern with a seam down the middle */
            background-image: 
                linear-gradient(90deg, transparent 49%, #222 50%, transparent 51%),
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-color: #0f0f0f;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        /* Tent Frame Pole */
        .frame-pole { position: absolute; left: 10%; top: 0; width: 15px; height: 100%; background: #333; box-shadow: 2px 0 5px #000; }
        .frame-pole.right { left: 90%; }

        /* Power cable hanging down */
        .cable { position: absolute; top: 0; left: 30%; width: 4px; height: 300px; background: #111; border-left: 2px solid #222; }

        /* Ceiling Rig */
        .ceiling-rig { width: 100%; height: 100px; display: flex; justify-content: space-around; z-index: 5; }
        .led-panel { width: 160px; height: 50px; background: #333; border: 2px solid #555; box-shadow: 0 0 20px #222; }

        /* Plants */
        .plant-row { display: flex; gap: 40px; align-items: flex-end; z-index: 5; }
        .pot-box { display: flex; flex-direction: column; align-items: center; }
        .leaf { width: 150px; height: 150px; background: #2d5a27; clip-path: polygon(50% 10%, 60% 30%, 85% 20%, 70% 45%, 95% 55%, 65% 60%, 80% 90%, 50% 70%, 20% 90%, 35% 60%, 5% 55%, 30% 45%, 15% 20%, 40% 30%); }
        .pot { width: 100px; height: 90px; background: #222; border-radius: 5px 5px 30px 30px; }

        /* Floor clutter */
        .floor-clutter { display: flex; gap: 50px; align-items: flex-end; z-index: 5; padding-bottom: 20px; }
        .cat { width: 70px; height: 50px; background: #d35400; border-radius: 20px; }
        .fan { width: 70px; height: 70px; background: #333; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="room-view">
        <div class="frame-pole"></div>
        <div class="frame-pole right"></div>
        <div class="cable"></div>

        <div class="ceiling-rig">
            <div class="led-panel"></div>
            <div class="led-panel"></div>
        </div>

        <div class="plant-row">
            <div class="pot-box"><div class="leaf"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="leaf"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="leaf"></div><div class="pot"></div></div>
        </div>

        <div class="floor-clutter">
            <div class="cat"></div>
            <div class="fan"></div>
        </div>
    </div>
</body>
</html>
