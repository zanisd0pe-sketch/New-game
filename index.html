<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">
    <h1>Money: <span id="money-count">0</span></h1>
    <button onclick="game.manualClick()" style="padding:20px; font-size:20px;">Click to Earn</button>

    <script>
        let game = {
            money: 0,
            plants: 1,
            manualClick() {
                this.money += 1;
                document.getElementById('money-count').innerText = this.money;
            },
            grow() {
                this.money += this.plants;
                document.getElementById('money-count').innerText = this.money;
            }
        };
        // Grow every second
        setInterval(() => game.grow(), 1000);
    </script>
</body>
</html>
