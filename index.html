<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=800, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; background: #000; color: #fff; font-family: monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            touch-action: none; /* Prevents touch panning/zooming */
            -webkit-user-select: none; user-select: none; 
        }
        
        #game-window { 
            width: 800px; height: 600px; background: #000; 
            border: 4px solid #333; position: relative;
            overflow: hidden;
        }
        
        .hud { padding: 10px; text-align: center; background: #111; }
        .wall { height: 360px; width: 100%; background: #121212; }
        .floor { 
            height: 240px; width: 100%;
            background-color: #2a2a2a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 8px 8px;
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 20px; padding-bottom: 20px;
            border-top: 5px solid #111;
        }

        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .leaf { width: 80px; height: 80px; background: #2d5a27; clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%); }
        .pot { width: 60px; height: 50px; background: #333; border: 3px solid #555; border-radius: 5px; }

        .controls { position: absolute; bottom: 10px; width: 100%; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #1a1a1a; color: #fff; border: 2px solid #444; }
    </style>
</head>
<body>
    <div id="game-window">
        <div class="hud">
            <h1>$ <span id="money">0</span></h1>
            <p>Plants: <span id="plant-count">1</span> | Yield: $<span id="yield">1</span>/sec</p>
        </div>
        <div class="wall"></div>
        <div class="floor" id="farm"></div>
        <div class="controls">
            <button onclick="game.buyPlant()">Buy Plant ($10)</button>
        </div>
    </div>

    <script>
        let game = {
            money: 0,
            plants: 1,
            cost: 10,
            updateUI() {
                document.getElementById('money').innerText = Math.floor(this.money);
                document.getElementById('plant-count').innerText = this.plants;
                document.getElementById('yield').innerText = this.plants;
            },
            buyPlant() {
                if (this.money >= this.cost) {
                    this.money -= this.cost;
                    this.plants++;
                    this.cost = Math.floor(this.cost * 1.5);
                    this.renderPlants();
                }
            },
            renderPlants() {
                const farm = document.getElementById('farm');
                farm.innerHTML = '';
                for(let i=0; i<this.plants; i++) {
                    farm.innerHTML += '<div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>';
                }
            }
        };
        setInterval(() => { game.money += (game.plants * 0.1); game.updateUI(); }, 100);
        game.renderPlants();
    </script>
</body>
</html>
