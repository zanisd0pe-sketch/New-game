<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon: Organic Growth</title>
    <style>
        body { background: #050505; color: #ccc; font-family: sans-serif; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; }

        #farm { background: #0a0a0a; }

        .plant-area { display: flex; gap: 60px; align-items: flex-end; flex-grow: 1; margin-bottom: 50px; }
        .pot-box { display: flex; flex-direction: column; align-items: center; }

        /* Stem and Leaf Container */
        .plant-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* The Stem */
        .stem { width: 6px; height: 40px; background: #3e2723; margin-bottom: -10px; border-radius: 2px; }

        /* The Fan Leaf */
        .leaf { 
            width: 160px; height: 160px; background: #2d5a27;
            clip-path: polygon(50% 10%, 60% 30%, 85% 20%, 70% 45%, 95% 55%, 65% 60%, 80% 90%, 50% 70%, 20% 90%, 35% 60%, 5% 55%, 30% 45%, 15% 20%, 40% 30%);
        }

        /* Fabric Grow Bag */
        .pot { 
            width: 100px; height: 90px; background: #1a1a1a;
            border: 2px solid #333; border-radius: 5px 5px 40px 40px;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="farm" class="room-view">
        <div class="plant-area">
            <div class="pot-box">
                <div class="plant-container">
                    <div class="leaf"></div>
                    <div class="stem"></div>
                </div>
                <div class="pot"></div>
            </div>
            <!-- Repeat for other pots -->
        </div>
    </div>
</body>
</html>
