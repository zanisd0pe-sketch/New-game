<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon: Pro Edition</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; width: 100vw; display: none; flex-direction: column; align-items: center; position: relative; }
        .active { display: flex; }

        /* Professional Grow Tent Background */
        #farm { background: radial-gradient(circle at 50% 0%, #222 0%, #000 80%); }
        
        /* Ceiling Ventilation & Light Rig */
        .ceiling { width: 100%; height: 80px; background: #111; border-bottom: 2px solid #333; display: flex; justify-content: center; align-items: center; }
        .vent { width: 90%; height: 20px; background: linear-gradient(to right, #444, #888, #444); border-radius: 10px; box-shadow: 0 0 10px #000; }

        /* High-Definition Plant Assets */
        .plant-area { display: flex; gap: 80px; align-items: flex-end; flex-grow: 1; margin-bottom: 60px; }
        .pot-box { display: flex; flex-direction: column; align-items: center; }
        
        .plant { 
            width: 170px; height: 170px; 
            background: conic-gradient(from 45deg, #1b5e20, #4caf50, #1b5e20, #2e7d32, #1b5e20);
            border-radius: 45% 45% 35% 35% / 60% 60% 30% 30%;
            border: 4px solid #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
        }
        
        .pot { 
            width: 110px; height: 95px; 
            background: linear-gradient(135deg, #3e2723, #5d4037); 
            border-top: 12px solid #2e1e1a; 
            border-radius: 4px 4px 50px 50px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.9);
        }

        .floor { width: 100%; height: 120px; background: #000; border-top: 2px solid #222; }

        .ui-panel { position: absolute; top: 100px; text-align: center; }
        button { padding: 15px 30px; cursor: pointer; background: #2e7d32; border: none; color: #fff; font-weight: bold; font-size: 16px; border-radius: 5px; box-shadow: 0 4px 0 #1b5e20; }
        button:active { transform: translateY(2px); box-shadow: none; }
        .map-btn { position: fixed; top: 20px; right: 20px; z-index: 200; background: #222; border: 1px solid #444; }
    </style>
</head>
<body>

    <button class="map-btn" onclick="toggleMap()">MAP</button>

    <div id="map-menu" style="display:none; position:fixed; width:100%; height:100vh; background:#000; z-index:100; justify-content:center; align-items:center; flex-direction:column; gap:20px;">
        <button onclick="showRoom('farm')">Grow Room</button>
        <button onclick="showRoom('shop')">Dispensary</button>
    </div>

    <div id="farm" class="room-view active">
        <div class="ceiling"><div class="vent"></div></div>
        
        <div class="ui-panel">
            <h2>SUPPLY: <span id="weed">0</span>g</h2>
            <button onclick="growWeed()">HARVEST</button>
        </div>

        <div class="plant-area">
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
        </div>
        
        <div class="floor"></div>
    </div>

    <script>
        let weed = 0;
        function toggleMap() { const m = document.getElementById('map-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showRoom(id) { document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMap(); }
        function growWeed() { weed += 3; document.getElementById("weed").innerText = weed; }
    </script>
</body>
</html>
