<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HUD */
        .hud { padding: 20px; background: #0a0a0a; text-align: center; border-bottom: 2px solid #222; z-index: 10; }
        
        /* The Grow Room */
        .room-stage { flex: 1; display: flex; flex-direction: column; }
        .wall { height: 60%; width: 100%; background: #121212; }
        .floor { 
            height: 40%; width: 100%;
            background-color: #2a2a2a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 8px 8px;
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 2vw; padding-bottom: 2vh;
            border-top: 5px solid #111;
        }

        /* Plant Art */
        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .leaf { 
            width: 80px; height: 80px; background: #2d5a27;
            clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%);
        }
        .pot { width: 60px; height: 50px; background: #333; border: 3px solid #555; border-radius: 5px; }

        /* Controls */
        .controls { position: fixed; bottom: 20px; width: 100%; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #1a1a1a; color: #fff; border: 2px solid #444; }
    </style>
</head>
<body>
    <div class="hud">
        <h1>$ <span id="money">0</span></h1>
        <p>Plants: <span id="plant-count">1</span> | Yield: $<span id="yield">1</span>/sec</p>
    </div>
    <div class="room-stage">
        <div class="wall"></div>
        <div class="floor" id="farm"></div>
    </div>
    <div class="controls">
        <button onclick="game.buyPlant()">Buy Plant ($10)</button>
    </div>

    <script>
        let game = {
            money: 0,
            plants: 1,
            cost: 10,
            updateUI() {
                document.getElementById('money').innerText = Math.floor(this.money);
                document.getElementById('plant-count').innerText = this.plants;
                document.getElementById('yield').innerText = this.plants;
            },
            buyPlant() {
                if (this.money >= this.cost) {
                    this.money -= this.cost;
                    this.plants++;
                    this.cost = Math.floor(this.cost * 1.5);
                    this.renderPlants();
                }
            },
            renderPlants() {
                const farm = document.getElementById('farm');
                farm.innerHTML = '';
                for(let i=0; i<this.plants; i++) {
                    farm.innerHTML += '<div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>';
                }
            }
        };
        setInterval(() => { game.money += (game.plants * 0.1); game.updateUI(); }, 100);
        game.renderPlants();
    </script>
</body>
</html>
