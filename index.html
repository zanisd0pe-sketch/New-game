<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; }
        
        /* This container will scale to fit any phone screen */
        #game-wrapper {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }
        
        .hud { padding: 20px; text-align: center; background: #111; font-size: 1.2rem; }
        .wall { flex-grow: 1; background: #121212; }
        .floor { 
            height: 40vh; width: 100%;
            background-color: #2a2a2a;
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 5vw; padding-bottom: 5vh; border-top: 5px solid #111;
        }

        .plant-container { display: flex; flex-direction: column; align-items: center; }
        .leaf { width: 15vw; height: 15vw; background: #2d5a27; clip-path: polygon(50% 0%, 63% 38%, 100% 38%, 69% 59%, 82% 100%, 50% 75%, 18% 100%, 31% 59%, 0% 38%, 37% 38%); }
        .pot { width: 10vw; height: 8vh; background: #333; border: 3px solid #555; border-radius: 5px; }

        .controls { position: fixed; bottom: 5vh; width: 100%; text-align: center; }
        button { padding: 4vw 8vw; font-size: 5vw; cursor: pointer; background: #1a1a1a; color: #fff; border: 2px solid #444; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="hud">
            <h1>$ <span id="money">0</span></h1>
            <p>Plants: <span id="plant-count">1</span></p>
        </div>
        <div class="wall"></div>
        <div class="floor" id="farm"></div>
        <div class="controls">
            <button onclick="game.buyPlant()">Buy Plant ($10)</button>
        </div>
    </div>

    <script>
        let game = {
            money: 0,
            plants: 1,
            cost: 10,
            updateUI() {
                document.getElementById('money').innerText = Math.floor(this.money);
                document.getElementById('plant-count').innerText = this.plants;
            },
            buyPlant() {
                if (this.money >= this.cost) {
                    this.money -= this.cost;
                    this.plants++;
                    this.cost = Math.floor(this.cost * 1.5);
                    this.renderPlants();
                }
            },
            renderPlants() {
                const farm = document.getElementById('farm');
                farm.innerHTML = '';
                for(let i=0; i<this.plants; i++) {
                    farm.innerHTML += '<div class="plant-container"><div class="leaf"></div><div class="pot"></div></div>';
                }
            }
        };
        setInterval(() => { game.money += (game.plants * 0.1); game.updateUI(); }, 100);
        game.renderPlants();
    </script>
</body>
</html>
