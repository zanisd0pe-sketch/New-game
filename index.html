<!DOCTYPE html>
<html>
<head>
    <title>Dispo Tycoon</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .room-view { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px; position: relative; }
        .active { display: flex; }

        /* Grow Room: Professional Tent Vibe */
        #farm { background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        
        /* Pro Ventilation Duct */
        .ventilation-duct { width: 100%; height: 60px; background: linear-gradient(90deg, #999, #ccc, #999); border-bottom: 5px solid #666; margin-bottom: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* Staged Pots */
        .shelf { display: flex; gap: 60px; margin-top: 20px; }
        .pot-box { display: flex; flex-direction: column; align-items: center; }
        .pot { width: 100px; height: 90px; background: #3e2723; border-radius: 5px; box-shadow: inset 0 -10px 10px rgba(0,0,0,0.5); }
        .plant { width: 130px; height: 130px; background: #2e7d32; border-radius: 50% 50% 40% 40%; margin-bottom: -30px; box-shadow: 0 0 20px #1b5e20; border: 2px solid #1e4d22; }

        .tarp-floor { width: 100%; height: 200px; background: #0a0a0a; border-top: 4px solid #333; position: absolute; bottom: 0; }
        
        #map-menu { display: none; position: fixed; top: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .map-btn { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 15px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <button class="map-btn" onclick="toggleMap()">MAP</button>

    <div id="map-menu">
        <button onclick="showRoom('farm')">Grow Room</button>
        <button onclick="showRoom('shop')">Dispensary</button>
    </div>

    <div id="farm" class="room-view active">
        <div class="ventilation-duct"></div>
        
        <div class="shelf">
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
            <div class="pot-box"><div class="plant"></div><div class="pot"></div></div>
        </div>

        <h2 style="margin-top: 50px; z-index: 2;">SUPPLY: <span id="weed">0</span>g</h2>
        <button onclick="growWeed()" style="z-index: 2;">HARVEST</button>
        
        <div class="tarp-floor"></div>
    </div>

    <div id="shop" class="room-view">
        <h1>DISPENSARY</h1>
        <p>Cash: $<span id="money">0</span></p>
    </div>

    <script>
        let money = 0; let weed = 0;
        function toggleMap() { const m = document.getElementById('map-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showRoom(id) { document.querySelectorAll('.room-view').forEach(r => r.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMap(); }
        function growWeed() { weed += 3; document.getElementById("weed").innerText = weed; }
        setInterval(() => { if (weed >= 1) { weed--; money += 10; document.getElementById("weed").innerText = weed; document.getElementById("money").innerText = money; } }, 2000);
    </script>
</body>
</html>
