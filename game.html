<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .hud { padding: 15px; text-align: center; background: #111; }
        #farm { flex-grow: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-end; gap: 10px; padding: 20px; overflow-y: auto; background-color: #2a2a2a; border-top: 5px solid #111; }
        
        /* New Organic Plant Design */
        .plant-container { display: flex; flex-direction: column; align-items: center; width: 22vw; margin-bottom: 10px; }
        .leaf-cluster { width: 20vw; height: 20vw; position: relative; }
        .leaf { 
            position: absolute; width: 8vw; height: 15vw; background: #2d5a27; 
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
        }
        .l1 { transform: rotate(0deg); }
        .l2 { transform: rotate(72deg); }
        .l3 { transform: rotate(144deg); }
        .l4 { transform: rotate(216deg); }
        .l5 { transform: rotate(288deg); }
        
        .pot { width: 12vw; height: 10vh; background: #4a3626; border: 2px solid #2e2117; border-radius: 0 0 5px 5px; margin-top: 5px; }

        .controls { height: 25vh; display: flex; justify-content: center; align-items: flex-start; padding-top: 2vh; background: #0a0a0a; }
        button { padding: 4vw 8vw; font-size: 6vw; cursor: pointer; background: #3a2a1a; color: #fff; border: 2px solid #5a4a3a; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="hud">
            <h1>$ <span id="money">0</span></h1>
            <p>Plants: <span id="plant-count">1</span></p>
        </div>
        <div id="farm"></div>
        <div class="controls">
            <button onclick="game.buyPlant()">Buy Plant ($<span id="cost">10</span>)</button>
        </div>
    </div>

    <script>
        let game = {
            money: 0,
            plants: 1,
            cost: 10,
            updateUI() {
                document.getElementById('money').innerText = Math.floor(this.money);
                document.getElementById('plant-count').innerText = this.plants;
                document.getElementById('cost').innerText = this.cost;
            },
            buyPlant() {
                if (this.money >= this.cost) {
                    this.money -= this.cost;
                    this.plants++;
                    this.cost = Math.floor(this.cost * 1.2);
                    this.renderPlants();
                    this.updateUI();
                }
            },
            renderPlants() {
                const farm = document.getElementById('farm');
                farm.innerHTML = '';
                for(let i=0; i<this.plants; i++) {
                    farm.innerHTML += `
                        <div class="plant-container">
                            <div class="leaf-cluster">
                                <div class="leaf l1"></div><div class="leaf l2"></div>
                                <div class="leaf l3"></div><div class="leaf l4"></div>
                                <div class="leaf l5"></div>
                            </div>
                            <div class="pot"></div>
                        </div>`;
                }
            }
        };
        setInterval(() => { game.money += (game.plants * 0.1); game.updateUI(); }, 100);
        game.renderPlants();
    </script>
</body>
</html>
